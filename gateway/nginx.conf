events {}

http {
  # API Gateway / single entry point (pertemuan 7).
  # Semua trafik masuk lewat :8080 lalu diteruskan ke service yang tepat.
  server {
    listen 80;

    # Frontend (static)
    location / {
      proxy_pass http://frontend:80;
    }

    # Auth service  -> /api/auth/login, /api/auth/register
    location /api/auth/ {
      proxy_pass http://auth-service:3004/;
    }

    # Product service -> /api/products, /api/products/:id
    location /api/products {
      proxy_pass http://product-service:3001/products;
    }

    # Order service -> /api/orders
    location /api/orders {
      proxy_pass http://order-service:3002/orders;
    }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Authorization $http_authorization;
  }
}
